<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection | Tienda Online</title>

<meta name="description" content="Tienda online moderna con moda, calzado y accesorios">
<meta name="theme-color" content="#131921">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

:root{
  --primary:#131921;
  --secondary:#232f3e;
  --accent:#f0c14b;
  --accent2:#ddb347;
  --bg:#eaeded;
  --text:#111;
  --white:#fff;
  --border:#ddd;
  --radius:12px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  overflow-x:hidden;
}

/* HEADER */
.header{
  background:var(--primary);
  color:white;
  position:sticky;
  top:0;
  z-index:999;
}

.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  gap:10px;
  flex-wrap:wrap;
}

.logo{
  font-size:22px;
  font-weight:900;
  color:white;
}
.logo span{color:var(--accent);}

.search-box{
  flex:1;
  display:flex;
  max-width:500px;
}

.search-box input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.search-box button{
  background:var(--accent);
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

.header-actions{
  display:flex;
  gap:15px;
  align-items:center;
}

.cart-btn{
  position:relative;
  cursor:pointer;
  font-size:22px;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#232f3e,#131921);
  color:white;
  padding:50px 20px;
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:center;
}

.hero h1{font-size:40px;}
.hero p{margin:10px 0;}

.hero-btn{
  display:inline-block;
  background:var(--accent);
  padding:12px 20px;
  color:black;
  font-weight:bold;
  border-radius:8px;
}

/* CATEGORIAS */
.categories{
  background:white;
  padding:10px;
  overflow-x:auto;
  white-space:nowrap;
}

.category-btn{
  display:inline-block;
  padding:8px 15px;
  margin-right:5px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}

.category-btn.active{
  background:var(--primary);
  color:white;
}

/* PRODUCTS */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.product-card{
  background:white;
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.product-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.product-body{
  padding:10px;
}

.product-price{
  font-size:20px;
  font-weight:bold;
}

.add-btn{
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

/* CART */
.cart-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
}

.cart-overlay.active{display:block;}

.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100vh;
  background:white;
  transition:.3s;
  display:flex;
  flex-direction:column;
}

.cart.open{right:0;}

.cart-header{
  padding:15px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.cart-items{
  flex:1;
  overflow:auto;
  padding:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.cart-footer{
  padding:15px;
  border-top:1px solid #eee;
}

.checkout-btn{
  width:100%;
  padding:12px;
  background:green;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* FLOAT CART MOBILE */
.cart-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  border:none;
  width:55px;
  height:55px;
  border-radius:50%;
}

/* FOOTER */
.footer{
  background:#131921;
  color:white;
  padding:40px 20px;
  margin-top:40px;
}

/* MOBILE FIX */
@media(max-width:768px){
  .hero-grid{
    grid-template-columns:1fr;
    text-align:center;
  }

  .cart{
    width:100%;
  }

  .hero h1{
    font-size:28px;
  }
}

   html, body {
  overflow-x: hidden;
  max-width: 100%;
}

* {
  max-width: 100%;
}
   
</style>
</head>

<body>

<header>
  <div class="header">
    <div class="logo">Grey's <span>Collection</span></div>

    <div class="search">
      <input id="search" placeholder="Buscar...">
      <button>🔍</button>
    </div>
  </div>
</header>

<div class="container">
  <div id="grid" class="grid"></div>
</div>

<button class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div class="cart" id="cart">
  <div class="cart-header">
    <b>Carrito</b>
    <button onclick="toggleCart()">✖</button>
  </div>

  <div class="cart-body" id="cartBody"></div>

  <div class="cart-footer">
    <h3 id="total">RD$0</h3>
    <button class="checkout" onclick="openCheckout()">Finalizar compra</button>
  </div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Datos de entrega</h3>

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">
    <textarea id="direccion" placeholder="Dirección"></textarea>

    <button onclick="sendOrder()">Confirmar pedido</button>
  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxdJr4HGGf3Opm_jc9EVJrM8c4O9lqTCsrjUwq7WLgS7E3Q6Jb5lAau-wHfshVmar7wiA/exec";

let productos=[];
let carrito=[];

/* LOAD */
fetch(URL).then(r=>r.json()).then(d=>{
  productos=d;
  render();
});

function render(){
  let g=document.getElementById("grid");
  g.innerHTML="";
  productos.forEach(p=>{
    g.innerHTML+=`
    <div class="card">
      <img src="${p.imagen}">
      <h4>${p.nombre}</h4>
      <div class="price">RD$ ${p.precio}</div>
      <button onclick="add(${p.id})">Agregar</button>
    </div>`;
  });
}

/* CART */
function add(id){
  let p=productos.find(x=>x.id==id);
  let i=carrito.find(x=>x.id==id);
  if(i) i.cantidad++;
  else carrito.push({...p,cantidad:1});
  update();
}

function update(){
  document.getElementById("count").innerText =
  carrito.reduce((a,b)=>a+b.cantidad,0);

  let t=0;
  let html="";

  carrito.forEach(i=>{
    t+=i.precio*i.cantidad;
    html+=`<div>${i.nombre} x${i.cantidad}</div>`;
  });

  document.getElementById("cartBody").innerHTML=html;
  document.getElementById("total").innerText="RD$"+t;
}

/* CART */
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

/* CHECKOUT */
function openCheckout(){
  document.getElementById("modal").classList.add("show");
}

/* SEND */
function sendOrder(){

  let data={
    nombre:document.getElementById("nombre").value,
    telefono:document.getElementById("telefono").value,
    direccion:document.getElementById("direccion").value,
    carrito:carrito,
    total:carrito.reduce((a,b)=>a+b.precio*b.cantidad,0)
  };

  fetch(URL,{
    method:"POST",
    body:JSON.stringify(data)
 .then((res)=>res.json())
.then((data)=>{

  const pedidoId = data.id || "PED-"+Date.now();

  // 1. Mensaje WhatsApp
  const mensaje = generarMensajeWhatsApp(pedidoId, {
    nombre,
    telefono,
    direccion,
    carrito,
    total: data.total || carrito.reduce((a,b)=>a+b.precio*b.cantidad,0)
  });

  // 2. Abrir WhatsApp
  const url = `https://wa.me/18298706768?text=${mensaje}`;
  window.open(url, "_blank");

  // 3. Reset carrito
  alert("Pedido enviado correctamente");

  carrito=[];
  update();
  document.getElementById("modal").classList.remove("show");

});

}

  function generarMensajeWhatsApp(pedidoId, datos){

  let mensaje = `🛍️ *GREY'S COLLECTION*\n`;
  mensaje += `📦 *Pedido:* ${pedidoId}\n\n`;

  mensaje += `👤 *Cliente:* ${datos.nombre}\n`;
  mensaje += `📱 *Tel:* ${datos.telefono}\n`;
  mensaje += `📍 *Dirección:* ${datos.direccion}\n\n`;

  mensaje += `🧾 *Productos:*\n`;

  datos.carrito.forEach(p => {
    mensaje += `• ${p.nombre} x${p.cantidad} = RD$ ${p.precio * p.cantidad}\n`;
  });

  mensaje += `\n💰 *Total:* RD$ ${datos.total}\n\n`;
  mensaje += `📌 Gracias por comprar en Grey's Collection`;

  return encodeURIComponent(mensaje);
}

</script>

</body>
</html>
