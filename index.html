<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection | Tienda Online</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

/* =========================
   FIX GLOBAL (LINEA NEGRA MOBILE)
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

html,body{
  width:100%;
  overflow-x:hidden;
  background:#eaeded;
}

/* =========================
   VARIABLES
========================= */

:root{
  --dark:#131921;
  --dark2:#232f3e;
  --accent:#f0c14b;
  --accent2:#ddb347;
}

/* =========================
   HEADER
========================= */

header{
  background:var(--dark);
  color:white;
  position:sticky;
  top:0;
  z-index:999;
}

.header-container{
  max-width:1400px;
  margin:auto;
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{
  font-weight:900;
  font-size:22px;
}

.logo span{ color:var(--accent); }

.search{
  flex:1;
  display:flex;
}

.search input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.search button{
  width:45px;
  border:none;
  background:var(--accent);
}

/* =========================
   HERO
========================= */

.hero{
  background:linear-gradient(135deg,var(--dark2),var(--dark));
  color:white;
  padding:50px 15px;
}

.hero-container{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* =========================
   CATEGORIAS
========================= */

.categories{
  background:white;
  padding:10px;
  overflow-x:auto;
}

.cat-list{
  display:flex;
  gap:10px;
}

.cat{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#eee;
}

/* =========================
   PRODUCTOS
========================= */

.container{
  max-width:1400px;
  margin:auto;
  padding:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  font-weight:900;
}

/* =========================
   CART FLOAT
========================= */

.cart-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:9999;
}

/* =========================
   CART PANEL FIX MOBILE
========================= */

.cart-panel{
  position:fixed;
  top:0;
  right:-420px;
  width:420px;
  max-width:100%;
  height:100dvh;
  background:white;
  transition:.3s;
  z-index:9999;
  display:flex;
  flex-direction:column;
}

.cart-panel.open{
  right:0;
}

.cart-header{
  padding:15px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.cart-body{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.cart-footer{
  padding:15px;
  border-top:1px solid #eee;
}

.cart-total{
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
}

.checkout-btn{
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  font-weight:800;
}

/* =========================
   ITEM
========================= */

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

.delete{
  background:red;
  color:white;
  border:none;
  width:25px;
  height:25px;
  border-radius:50%;
}

.qty button{
  width:25px;
  height:25px;
  border:none;
}

</style>
</head>

<body>

<header>
  <div class="header-container">
    <div class="logo">Grey's <span>Collection</span></div>

    <div class="search">
      <input id="searchInput" placeholder="Buscar...">
      <button><i class="fa fa-search"></i></button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-container">
    <div>
      <h1>Moda y estilo</h1>
      <p>Compra rápido y seguro</p>
    </div>
  </div>
</section>

<section class="categories">
  <div class="cat-list" id="cats"></div>
</section>

<main class="container">
  <div class="products" id="products"></div>
</main>

<div class="cart-float" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<div class="cart-panel" id="cartPanel">

  <div class="cart-header">
    <h3>Carrito</h3>
    <span onclick="toggleCart()">✕</span>
  </div>

  <div class="cart-body" id="cartBody"></div>

  <div class="cart-footer">
    <div class="cart-total" id="total">RD$0</div>
    <button class="checkout-btn" onclick="abrirCheckout()">Finalizar compra</button>
  </div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const URL = "https://script.google.com/macros/s/AKfycbxdJr4HGGf3Opm_jc9EVJrM8c4O9lqTCsrjUwq7WLgS7E3Q6Jb5lAau-wHfshVmar7wiA/exec";
const WHATSAPP = "18298706768";

/* =========================
   DATA
========================= */

let productos=[];
let carrito=[];

/* =========================
   INIT
========================= */

document.addEventListener("DOMContentLoaded",()=>{
  loadProducts();
});

/* =========================
   PRODUCTS
========================= */

async function loadProducts(){

  const res = await fetch(URL);
  productos = await res.json();

  renderProducts();
  renderCats();
}

function renderProducts(){

  const box=document.getElementById("products");
  box.innerHTML="";

  productos.forEach(p=>{

    box.innerHTML+=`
    <div class="card">
      <img src="${p.imagen}">
      <div class="card-body">
        <b>${p.nombre}</b>
        <div class="price">RD$ ${p.precio}</div>
        <button onclick="add(${p.id})">Agregar</button>
      </div>
    </div>`;
  });
}

/* =========================
   CART
========================= */

function add(id){

  let p=productos.find(x=>x.id==id);
  let item=carrito.find(x=>x.id==id);

  if(item){
    item.cantidad++;
  }else{
    carrito.push({...p,cantidad:1});
  }

  updateCart();
}

function updateCart(){

  let box=document.getElementById("cartBody");
  let count=document.getElementById("count");
  let total=document.getElementById("total");

  box.innerHTML="";
  let t=0,c=0;

  carrito.forEach(i=>{

    t+=i.precio*i.cantidad;
    c+=i.cantidad;

    box.innerHTML+=`
    <div class="cart-item">
      <div>${i.nombre}</div>
      <div class="qty">
        <button onclick="change(${i.id},-1)">-</button>
        ${i.cantidad}
        <button onclick="change(${i.id},1)">+</button>
      </div>
      <button class="delete" onclick="removeItem(${i.id})">x</button>
    </div>`;
  });

  count.innerText=c;
  total.innerText="RD$"+t;
}

function change(id,n){
  let i=carrito.find(x=>x.id==id);
  if(!i) return;
  i.cantidad+=n;
  if(i.cantidad<=0) carrito=carrito.filter(x=>x.id!=id);
  updateCart();
}

function removeItem(id){
  carrito=carrito.filter(x=>x.id!=id);
  updateCart();
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("open");
}

/* =========================
   CHECKOUT + WHATSAPP
========================= */

function abrirCheckout(){

  let msg="Pedido:\n";

  carrito.forEach(i=>{
    msg+=`${i.nombre} x${i.cantidad}\n`;
  });

  let url=`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`;

  window.open(url,"_blank");
}

</script>

</body>
</html>
