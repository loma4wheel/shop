<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection | Moda y Estilo</title>

<meta name="description" content="Grey's Collection. Moda, calzado y accesorios con entrega rápida.">
<meta name="theme-color" content="#131921">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
:root{
--primary:#131921;
--primary-light:#232f3e;
--accent:#f0c14b;
--accent-hover:#ddb347;
--success:#067d62;
--danger:#b12704;
--bg:#eaeded;
--white:#fff;
--text:#0f1111;
--text-light:#565959;
--border:#d5d9d9;
--shadow:0 4px 12px rgba(0,0,0,.08);
--radius:12px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);overflow-x:hidden}
a{text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:1400px;margin:auto;padding:0 20px}

/* HEADER */
.header{position:sticky;top:0;z-index:999;background:var(--primary);box-shadow:0 4px 15px rgba(0,0,0,.15)}
.header-top{display:flex;align-items:center;gap:20px;padding:15px 0}
.logo{font-size:28px;font-weight:900;color:#fff}
.logo span{color:var(--accent)}

.search-box{flex:1;display:flex;border-radius:8px;overflow:hidden}
.search-box input{flex:1;padding:14px;border:none;outline:none}
.search-box button{width:60px;background:var(--accent);border:none}

/* CART */
.cart-btn{color:#fff;font-size:26px;position:relative;cursor:pointer}
.cart-count{position:absolute;top:-8px;right:-8px;background:#e53935;color:#fff;font-size:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.cart-float{
position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;
background:#ff4d4d;color:#fff;border:none;z-index:9999
}

/* HERO */
.hero{background:linear-gradient(135deg,#232f3e,#131921);color:#fff;padding:60px 0}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero h1{font-size:52px}

/* CATEGORIES */
.categories{background:#fff;padding:10px 0;border-bottom:1px solid var(--border)}
.category-list{display:flex;gap:10px;overflow:auto}
.category-btn{border:none;padding:10px 18px;border-radius:50px;background:#f5f5f5;font-weight:600}
.category-btn.active{background:var(--primary);color:#fff}

/* PRODUCTS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.product-image{height:240px;display:flex;align-items:center;justify-content:center}
.product-image img{width:100%;height:100%;object-fit:cover}
.product-body{padding:15px}
.product-title{font-weight:700;margin:10px 0}
.product-price{font-size:22px;font-weight:800}
.product-stock.low{color:var(--danger)}
.add-cart{background:var(--accent);border:none;padding:10px;width:100%;font-weight:700}

/* CART PANEL */
.cart{
position:fixed;top:0;right:-420px;width:420px;height:100vh;background:#fff;transition:.3s;z-index:9999;
box-shadow:-5px 0 20px rgba(0,0,0,.2)
}
.cart.open{right:0}
.cart-header{padding:20px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between}
.cart-items{padding:15px;overflow:auto;flex:1}
.cart-footer{padding:20px;border-top:1px solid #ddd}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center}
.modal.active{display:flex}
.modal-content{background:#fff;width:100%;max-width:600px;border-radius:12px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:12px 18px;border-radius:10px;opacity:0;transition:.3s}
.toast.show{opacity:1}
</style>
</head>

<body>

<header class="header">
<div class="container">
<div class="header-top">

<a class="logo">Grey's <span>Collection</span></a>

<div class="search-box">
<input id="searchInput" placeholder="Buscar productos...">
<button><i class="fa fa-search"></i></button>
</div>

<div class="cart-btn" id="cartBtn">
<i class="fa fa-cart-shopping"></i>
<div class="cart-count" id="cartCount">0</div>
</div>

</div>
</div>
</header>

<section class="hero">
<div class="container hero-grid">
<div>
<h1>Moda y estilo para todos</h1>
<p>Compra fácil, rápido y seguro</p>
</div>
</div>
</section>

<section class="categories">
<div class="container">
<div class="category-list" id="categoryContainer">
<button class="category-btn active" data-category="todas">Todas</button>
</div>
</div>
</section>

<main class="container">
<div class="products-grid" id="productsGrid"></div>
</main>

<div class="cart-float" id="cartFloat">🛒</div>

<aside class="cart" id="cart">
<div class="cart-header">
<h3>Carrito</h3>
<button id="closeCart">✕</button>
</div>

<div class="cart-items" id="cartItems"></div>

<div class="cart-footer">
<h3 id="cartTotal">RD$0</h3>
</div>
</aside>

<div class="toast" id="toast"></div>

<script>


/* =========================================================
   CONFIGURACION
========================================================= */

/* ================= CONFIG ================= */
const URL_BACKEND_GOOGLE = "https://script.google.com/macros/s/AKfycbxdJr4HGGf3Opm_jc9EVJrM8c4O9lqTCsrjUwq7WLgS7E3Q6Jb5lAau-wHfshVmar7wiA/exec";
const WHATSAPP_TIENDA = "18298706768";

/* ================= STATE ================= */
let productos = [];
let productosFiltrados = [];
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let categoriaActual = "todas";

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
  cargarProductos();
  renderCarrito();
  registrarEventos();
});

/* ================= LOCALSTORAGE ================= */
function guardarCarrito(){
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

/* ================= TOAST ================= */
function mostrarToast(texto){
  const toast = document.getElementById("toast");
  toast.textContent = texto;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 2000);
}

/* ================= MONEY ================= */
function money(v){
  return Number(v || 0).toLocaleString("es-DO");
}

/* ================= PRODUCTOS ================= */
async function cargarProductos(){
  try{
    const res = await fetch(URL_BACKEND_GOOGLE);
    productos = await res.json() || [];
    productosFiltrados = [...productos];
    crearCategorias();
    renderProductos();
  }catch(e){
    console.error(e);
  }
}

/* ================= CATEGORIAS ================= */
function crearCategorias(){
  const container = document.getElementById("categoryContainer");

  const cats = [...new Set(productos.map(p => p.categoria))];

  cats.forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "category-btn";
    btn.textContent = cat;

    btn.onclick = () => {
      categoriaActual = cat;
      aplicarFiltros();
    };

    container.appendChild(btn);
  });
}

/* ================= FILTROS ================= */
function aplicarFiltros(){
  const text = document.getElementById("searchInput").value.toLowerCase();

  productosFiltrados = productos.filter(p =>
    (categoriaActual === "todas" || p.categoria === categoriaActual) &&
    (p.nombre.toLowerCase().includes(text) || (p.descripcion||"").toLowerCase().includes(text))
  );

  renderProductos();
}

/* ================= RENDER PRODUCTOS ================= */
function renderProductos(){
  const grid = document.getElementById("productsGrid");

  grid.innerHTML = "";

  productosFiltrados.forEach(p=>{
    const stock = Number(p.stock || 0);

    grid.innerHTML += `
      <div class="product-card">
        <div class="product-image">
          <img src="${p.imagen}">
        </div>

        <div class="product-body">
          <div class="product-title">${p.nombre}</div>
          <div class="product-price">RD$ ${money(p.precio)}</div>

          <button ${stock<=0 ? "disabled":""}
            onclick="agregarCarrito('${p.id}')">
            ${stock>0 ? "Agregar" : "Agotado"}
          </button>
        </div>
      </div>
    `;
  });
}

/* ================= ADD CART ================= */
function agregarCarrito(id){
  const prod = productos.find(p => String(p.id) === String(id));
  if(!prod) return;

  let item = carrito.find(p => p.id == id);

  if(item){
    if(item.cantidad + 1 > prod.stock){
      return mostrarToast("Sin stock");
    }
    item.cantidad++;
  }else{
    carrito.push({
      id: prod.id,
      nombre: prod.nombre,
      precio: Number(prod.precio),
      cantidad: 1
    });
  }

  guardarCarrito();
  renderCarrito();
  mostrarToast("Agregado al carrito");
}

/* ================= RENDER CART ================= */
function renderCarrito(){

  const box = document.getElementById("cartItems");
  const count = document.getElementById("cartCount");
  const float = document.getElementById("cart-count");
  const totalBox = document.getElementById("cartTotal");

  let total = 0;
  let qty = 0;

  box.innerHTML = "";

  carrito.forEach(i=>{
    total += i.precio * i.cantidad;
    qty += i.cantidad;

    box.innerHTML += `
      <div class="cart-item">
        <span>${i.nombre}</span>

        <div>
          <button onclick="changeQty('${i.id}',-1)">-</button>
          ${i.cantidad}
          <button onclick="changeQty('${i.id}',1)">+</button>
        </div>
      </div>
    `;
  });

  count.textContent = qty;
  if(float) float.textContent = qty;
  totalBox.textContent = "RD$ " + money(total);
}

/* ================= CHANGE QTY ================= */
function changeQty(id, n){

  const item = carrito.find(p => p.id == id);
  if(!item) return;

  if(item.cantidad + n <= 0){
    carrito = carrito.filter(p => p.id != id);
  }else{
    item.cantidad += n;
  }

  guardarCarrito();
  renderCarrito();
}

/* ================= EVENTS ================= */
function registrarEventos(){

  document.getElementById("cartBtn").onclick = () => {
    document.getElementById("cart").classList.toggle("open");
  };

  document.getElementById("cart-float-btn").onclick = () => {
    document.getElementById("cart").classList.toggle("open");
  };

  document.getElementById("closeCart").onclick = () => {
    document.getElementById("cart").classList.remove("open");
  };

  document.getElementById("searchInput").oninput = aplicarFiltros;

  document.getElementById("checkoutBtn").onclick = () => {

    let msg = "Pedido:\n";
    carrito.forEach(i=>{
      msg += `- ${i.nombre} x${i.cantidad}\n`;
    });

    window.open(
      "https://wa.me/" + WHATSAPP_TIENDA + "?text=" + encodeURIComponent(msg),
      "_blank"
    );

    carrito = [];
    guardarCarrito();
    renderCarrito();
  };
}
   

</script>
