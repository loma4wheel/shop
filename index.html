<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection | Tienda Online</title>

<meta name="description" content="Tienda online moderna con moda, calzado y accesorios">
<meta name="theme-color" content="#131921">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

:root{
  --primary:#131921;
  --secondary:#232f3e;
  --accent:#f0c14b;
  --accent2:#ddb347;
  --bg:#eaeded;
  --text:#111;
  --white:#fff;
  --border:#ddd;
  --radius:12px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  overflow-x:hidden;
}

/* HEADER */
.header{
  background:var(--primary);
  color:white;
  position:sticky;
  top:0;
  z-index:999;
}

.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  gap:10px;
  flex-wrap:wrap;
}

.logo{
  font-size:22px;
  font-weight:900;
  color:white;
}
.logo span{color:var(--accent);}

.search-box{
  flex:1;
  display:flex;
  max-width:500px;
}

.search-box input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.search-box button{
  background:var(--accent);
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

.header-actions{
  display:flex;
  gap:15px;
  align-items:center;
}

.cart-btn{
  position:relative;
  cursor:pointer;
  font-size:22px;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#232f3e,#131921);
  color:white;
  padding:50px 20px;
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:center;
}

.hero h1{font-size:40px;}
.hero p{margin:10px 0;}

.hero-btn{
  display:inline-block;
  background:var(--accent);
  padding:12px 20px;
  color:black;
  font-weight:bold;
  border-radius:8px;
}

/* CATEGORIAS */
.categories{
  background:white;
  padding:10px;
  overflow-x:auto;
  white-space:nowrap;
}

.category-btn{
  display:inline-block;
  padding:8px 15px;
  margin-right:5px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}

.category-btn.active{
  background:var(--primary);
  color:white;
}

/* PRODUCTS */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.product-card{
  background:white;
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.product-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.product-body{
  padding:10px;
}

.product-price{
  font-size:20px;
  font-weight:bold;
}

.add-btn{
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

/* CART */
.cart-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
}

.cart-overlay.active{display:block;}

.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100vh;
  background:white;
  transition:.3s;
  display:flex;
  flex-direction:column;
}

.cart.open{right:0;}

.cart-header{
  padding:15px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.cart-items{
  flex:1;
  overflow:auto;
  padding:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.cart-footer{
  padding:15px;
  border-top:1px solid #eee;
}

.checkout-btn{
  width:100%;
  padding:12px;
  background:green;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* FLOAT CART MOBILE */
.cart-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  border:none;
  width:55px;
  height:55px;
  border-radius:50%;
}

/* FOOTER */
.footer{
  background:#131921;
  color:white;
  padding:40px 20px;
  margin-top:40px;
}

/* MOBILE FIX */
@media(max-width:768px){
  .hero-grid{
    grid-template-columns:1fr;
    text-align:center;
  }

  .cart{
    width:100%;
  }

  .hero h1{
    font-size:28px;
  }
}

   html, body {
  overflow-x: hidden;
  max-width: 100%;
}

* {
  max-width: 100%;
}
   
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-container">

    <div class="logo">
      Grey's <span>Collection</span>
    </div>

    <div class="search">
      <input type="text" placeholder="Buscar productos...">
      <button><i class="fa fa-search"></i></button>
    </div>

    <div class="actions">
      <div class="cart">
        <i class="fa fa-shopping-cart"></i>
        <span id="cartCount">0</span>
      </div>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-container">

    <div>
      <h1>Moda, estilo y tendencias</h1>
      <p>Compra productos exclusivos con entrega rápida.</p>
      <a class="btn" href="#productos">Comprar ahora</a>
    </div>

    <div>
      <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200" style="width:100%;border-radius:15px;">
    </div>

  </div>
</section>

<!-- CATEGORÍAS -->
<section class="categories">
  <div class="cat-list">
    <button class="cat">Todas</button>
  </div>
</section>

<!-- PRODUCTOS -->
<main class="container">
  <h2>Productos</h2>
  <div class="products" id="products"></div>
</main>

<!-- CART FLOAT -->
<div class="cart-float">
  🛒
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3>Carrito</h3>
    <span>X</span>
  </div>
</div>

</body>
</html>

<script>

/* =========================
   CONFIG
========================= */

const URL_BACKEND_GOOGLE = "https://script.google.com/macros/s/AKfycbxdJr4HGGf3Opm_jc9EVJrM8c4O9lqTCsrjUwq7WLgS7E3Q6Jb5lAau-wHfshVmar7wiA/exec";
const WHATSAPP_TIENDA = "18298706768";

/* =========================
   ESTADO GLOBAL LIMPIO
========================= */

let productos = [];
let productosFiltrados = [];
let carrito = [];
let categoriaActual = "todas";

/* =========================
   INIT (UNA SOLA VEZ)
========================= */

document.addEventListener("DOMContentLoaded", () => {
  cargarCarrito();
  cargarProductos();
  eventosUI();
});

/* =========================
   EVENTOS UI
========================= */

function eventosUI(){

  // carrito abrir/cerrar
  document.querySelector(".cart").addEventListener("click", toggleCart);

  document.querySelector(".cart-float").addEventListener("click", toggleCart);

  // buscador
  const input = document.querySelector(".search input");
  if(input){
    input.addEventListener("input", filtrar);
  }

}

/* =========================
   PRODUCTOS
========================= */

async function cargarProductos(){

  const cont = document.getElementById("products");

  cont.innerHTML = "Cargando...";

  try{

    const res = await fetch(URL_BACKEND_GOOGLE);
    const data = await res.json();

    productos = Array.isArray(data) ? data : [];

    productosFiltrados = [...productos];

    renderProductos();
    renderCategorias();

  }catch(e){

    cont.innerHTML = "Error cargando productos";
    console.error(e);

  }

}

/* =========================
   RENDER PRODUCTOS
========================= */

function renderProductos(){

  const cont = document.getElementById("products");

  cont.innerHTML = "";

  if(productosFiltrados.length === 0){
    cont.innerHTML = "<p>No hay productos</p>";
    return;
  }

  productosFiltrados.forEach(p => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.imagen}">
      <div class="card-body">
        <h3>${p.nombre}</h3>
        <small>${p.categoria || ""}</small>
        <div class="price">RD$ ${money(p.precio)}</div>

        <button class="add">
          Añadir
        </button>
      </div>
    `;

    div.querySelector("button").onclick = () => agregarCarrito(p.id);

    cont.appendChild(div);

  });

}

/* =========================
   CATEGORÍAS (FIX REAL)
========================= */

function renderCategorias(){

  const cont = document.querySelector(".cat-list");

  cont.innerHTML = `<button class="cat active" onclick="setCat('todas')">Todas</button>`;

  const cats = [...new Set(productos.map(p => p.categoria))];

  cats.forEach(c => {

    const btn = document.createElement("button");
    btn.className = "cat";
    btn.textContent = c;

    btn.onclick = () => setCat(c);

    cont.appendChild(btn);

  });

}

/* =========================
   SET CATEGORÍA (FIX)
========================= */

function setCat(cat){

  categoriaActual = cat;

  document.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));

  event.target.classList.add("active");

  filtrar();

}

/* =========================
   FILTRO (FIX TOTAL)
========================= */

function filtrar(){

  const text = document.querySelector(".search input")?.value?.toLowerCase() || "";

  productosFiltrados = productos.filter(p => {

    const okCat = categoriaActual === "todas" || p.categoria === categoriaActual;

    const okText =
      p.nombre.toLowerCase().includes(text) ||
      (p.descripcion || "").toLowerCase().includes(text);

    return okCat && okText;

  });

  renderProductos();

}

/* =========================
   CARRITO (UN SOLO SISTEMA)
========================= */

let carrito = [];

function agregarCarrito(id){

  const prod = productos.find(p => String(p.id) === String(id));
  if(!prod) return;

  let item = carrito.find(p => String(p.id) === String(id));

  if(item){
    if(item.cantidad + 1 > prod.stock){
      alert("No hay stock suficiente");
      return;
    }
    item.cantidad++;
  } else {
    carrito.push({
      id: prod.id,
      nombre: prod.nombre,
      precio: Number(prod.precio),
      cantidad: 1,
      stock: Number(prod.stock)
    });
  }

  renderCarrito();
}

function renderCarrito(){

  const cont = document.getElementById("cartItems");
  const totalEl = document.getElementById("cartTotal");
  const countEl = document.getElementById("cartCount");

  cont.innerHTML = "";

  let total = 0;
  let count = 0;

  carrito.forEach(item => {

    total += item.precio * item.cantidad;
    count += item.cantidad;

    cont.innerHTML += `
      <div class="cart-item">
        <div>
          <strong>${item.nombre}</strong><br>
          RD$ ${item.precio}
        </div>

        <div>
          <button onclick="cambiarCantidad('${item.id}',-1)">-</button>
          ${item.cantidad}
          <button onclick="cambiarCantidad('${item.id}',1)">+</button>
        </div>
      </div>
    `;
  });

  totalEl.innerText = "RD$ " + total;
  countEl.innerText = count;
}
   

function abrirCheckout(){
  document.getElementById("checkoutModal").classList.add("active");
}

function cerrarCheckout(){
  document.getElementById("checkoutModal").classList.remove("active");
}

   document.addEventListener("DOMContentLoaded", () => {

  document.getElementById("checkoutBtn")
  .addEventListener("click", () => {

    if(carrito.length === 0){
      alert("Carrito vacío");
      return;
    }

    abrirCheckout();

  });

});

/* =========================
   CAMBIAR CANTIDAD
========================= */

function changeQty(id, n){

  const item = carrito.find(p => String(p.id) === String(id));
  const prod = productos.find(p => String(p.id) === String(id));

  if(!item) return;

  const next = item.cantidad + n;

  if(next <= 0){
    carrito = carrito.filter(p => p.id !== id);
  }else if(next <= prod.stock){
    item.cantidad = next;
  }

  saveCart();
  renderCart();
  updateCount();

}
   

function removeItem(id){

  carrito = carrito.filter(
    p => String(p.id) !== String(id)
  );

  saveCart();
  renderCart();
  updateCount();

}

   
/* =========================
   TOGGLE CART (FIX REAL)
========================= */

function toggleCart(){

  const panel = document.getElementById("cartPanel");

  panel.classList.toggle("open");

}

/* =========================
   CONTADOR FIX
========================= */

function updateCount(){

  const c = document.getElementById("cartCount");

  c.textContent = carrito.reduce((a,b) => a + b.cantidad, 0);

}

/* =========================
   STORAGE FIX
========================= */

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(carrito));
}

function cargarCarrito(){

  const d = localStorage.getItem("cart");

  carrito = d ? JSON.parse(d) : [];

  renderCart();
  updateCount();

}

/* =========================
   MONEY
========================= */

function money(v){
  return Number(v||0).toLocaleString("es-DO");
}

</script>
