<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection | Tienda Online</title>

<meta name="theme-color" content="#131921">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

/* =========================
   VARIABLES
========================= */
:root{
  --bg:#eaeded;
  --dark:#131921;
  --dark2:#232f3e;
  --accent:#f0c14b;
  --accent2:#ddb347;
  --white:#fff;
  --text:#111;
  --radius:12px;
  --shadow:0 4px 15px rgba(0,0,0,.1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  overflow-x:hidden;
}

/* =========================
   HEADER
========================= */
header{
  background:var(--dark);
  color:white;
  position:sticky;
  top:0;
  z-index:999;
}

.header-container{
  max-width:1400px;
  margin:auto;
  padding:15px 20px;
  display:flex;
  align-items:center;
  gap:20px;
}

.logo{
  font-size:26px;
  font-weight:900;
  white-space:nowrap;
}

.logo span{
  color:var(--accent);
}

.search{
  flex:1;
  display:flex;
}

.search input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
}

.search button{
  width:50px;
  border:none;
  background:var(--accent);
  cursor:pointer;
}

.search button:hover{
  background:var(--accent2);
}

.actions{
  display:flex;
  gap:20px;
  align-items:center;
}

.cart{
  position:relative;
  cursor:pointer;
  font-size:22px;
}

.cart span{
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  color:white;
  font-size:11px;
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
}

/* =========================
   HERO
========================= */
.hero{
  background:linear-gradient(135deg,#232f3e,#131921);
  color:white;
  padding:60px 20px;
}

.hero-container{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
}

.hero h1{
  font-size:48px;
}

.hero p{
  margin:15px 0;
  opacity:.9;
}

.btn{
  display:inline-block;
  padding:12px 25px;
  background:var(--accent);
  color:black;
  font-weight:700;
  border-radius:8px;
  text-decoration:none;
}

/* =========================
   CATEGORÍAS
========================= */
.categories{
  background:white;
  padding:10px;
  overflow-x:auto;
}

.cat-list{
  display:flex;
  gap:10px;
}

.cat{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

/* =========================
   PRODUCTOS
========================= */
.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  transition:.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.price{
  font-size:20px;
  font-weight:800;
  margin-top:10px;
}

.add{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  font-weight:700;
  cursor:pointer;
}

/* =========================
   CART FLOAT
========================= */
.cart-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* FIX MOBILE + PANEL */
.cart-panel{
  position:fixed;
  top:0;
  right:-420px;
  width:420px;
  max-width:100%;
  height:100dvh; /* 🔥 FIX LINEA NEGRA */
  background:white;
  box-shadow:-5px 0 25px rgba(0,0,0,.15);
  transition:.3s;
  z-index:9999;
  display:flex;
  flex-direction:column;
}

.cart-panel.open{
  right:0;
}

/* HEADER */
.cart-header{
  padding:15px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BODY */
.cart-body{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* FOOTER FIJO */
.cart-footer{
  border-top:1px solid #eee;
  padding:15px;
  background:white;
}

/* TOTAL GRANDE */
.cart-total{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

/* BOTON CHECKOUT */
.checkout-btn{
  width:100%;
  padding:12px;
  border:none;
  background:#f0c14b;
  font-weight:800;
  cursor:pointer;
  border-radius:8px;
}

/* ITEM */
.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  gap:10px;
  padding-bottom:10px;
  border-bottom:1px solid #eee;
}

/* BOTONES */
.qty button{
  width:26px;
  height:26px;
  border:none;
  border-radius:50%;
  background:#eee;
  cursor:pointer;
}

.delete-btn{
  border:none;
  background:#ff4d4d;
  color:white;
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){
  .hero-container{
    grid-template-columns:1fr;
    text-align:center;
  }

  .hero h1{
    font-size:32px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-container">

    <div class="logo">
      Grey's <span>Collection</span>
    </div>

    <div class="search">
      <input type="text" placeholder="Buscar productos...">
      <button><i class="fa fa-search"></i></button>
    </div>

    <div class="actions">
      <div class="cart">
        <i class="fa fa-shopping-cart"></i>
        <span id="cartCount">0</span>
      </div>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-container">

    <div>
      <h1>Moda, estilo y tendencias</h1>
      <p>Compra productos exclusivos con entrega rápida.</p>
      <a class="btn" href="#productos">Comprar ahora</a>
    </div>

    <div>
      <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200" style="width:100%;border-radius:15px;">
    </div>

  </div>
</section>

<!-- CATEGORÍAS -->
<section class="categories">
  <div class="cat-list">
    <button class="cat">Todas</button>
  </div>
</section>

<!-- PRODUCTOS -->
<main class="container">
  <h2>Productos</h2>
  <div class="products" id="products"></div>
</main>

<!-- CART FLOAT -->
<div class="cart-float">
  🛒
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3>Carrito</h3>
    <span>X</span>
  </div>
</div>

</body>
</html>

<script>

/* =========================
   CONFIG
========================= */

const URL_BACKEND_GOOGLE = "https://script.google.com/macros/s/AKfycbxdJr4HGGf3Opm_jc9EVJrM8c4O9lqTCsrjUwq7WLgS7E3Q6Jb5lAau-wHfshVmar7wiA/exec";
const WHATSAPP_TIENDA = "18298706768";

/* =========================
   ESTADO GLOBAL LIMPIO
========================= */

let productos = [];
let productosFiltrados = [];
let carrito = [];
let categoriaActual = "todas";

/* =========================
   INIT (UNA SOLA VEZ)
========================= */

document.addEventListener("DOMContentLoaded", () => {
  cargarCarrito();
  cargarProductos();
  eventosUI();
});

/* =========================
   EVENTOS UI
========================= */

function eventosUI(){

  // carrito abrir/cerrar
  document.querySelector(".cart").addEventListener("click", toggleCart);

  document.querySelector(".cart-float").addEventListener("click", toggleCart);

  // buscador
  const input = document.querySelector(".search input");
  if(input){
    input.addEventListener("input", filtrar);
  }

}

/* =========================
   PRODUCTOS
========================= */

async function cargarProductos(){

  const cont = document.getElementById("products");

  cont.innerHTML = "Cargando...";

  try{

    const res = await fetch(URL_BACKEND_GOOGLE);
    const data = await res.json();

    productos = Array.isArray(data) ? data : [];

    productosFiltrados = [...productos];

    renderProductos();
    renderCategorias();

  }catch(e){

    cont.innerHTML = "Error cargando productos";
    console.error(e);

  }

}

/* =========================
   RENDER PRODUCTOS
========================= */

function renderProductos(){

  const cont = document.getElementById("products");

  cont.innerHTML = "";

  if(productosFiltrados.length === 0){
    cont.innerHTML = "<p>No hay productos</p>";
    return;
  }

  productosFiltrados.forEach(p => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.imagen}">
      <div class="card-body">
        <h3>${p.nombre}</h3>
        <small>${p.categoria || ""}</small>
        <div class="price">RD$ ${money(p.precio)}</div>

        <button class="add">
          Añadir
        </button>
      </div>
    `;

    div.querySelector("button").onclick = () => agregarCarrito(p.id);

    cont.appendChild(div);

  });

}

/* =========================
   CATEGORÍAS (FIX REAL)
========================= */

function renderCategorias(){

  const cont = document.querySelector(".cat-list");

  cont.innerHTML = `<button class="cat active" onclick="setCat('todas')">Todas</button>`;

  const cats = [...new Set(productos.map(p => p.categoria))];

  cats.forEach(c => {

    const btn = document.createElement("button");
    btn.className = "cat";
    btn.textContent = c;

    btn.onclick = () => setCat(c);

    cont.appendChild(btn);

  });

}

/* =========================
   SET CATEGORÍA (FIX)
========================= */

function setCat(cat){

  categoriaActual = cat;

  document.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));

  event.target.classList.add("active");

  filtrar();

}

/* =========================
   FILTRO (FIX TOTAL)
========================= */

function filtrar(){

  const text = document.querySelector(".search input")?.value?.toLowerCase() || "";

  productosFiltrados = productos.filter(p => {

    const okCat = categoriaActual === "todas" || p.categoria === categoriaActual;

    const okText =
      p.nombre.toLowerCase().includes(text) ||
      (p.descripcion || "").toLowerCase().includes(text);

    return okCat && okText;

  });

  renderProductos();

}

/* =========================
   CARRITO (UN SOLO SISTEMA)
========================= */

function agregarCarrito(id){

  const prod = productos.find(p => String(p.id) === String(id));
  if(!prod) return;

  const item = carrito.find(p => String(p.id) === String(id));

  if(item){
    if(item.cantidad + 1 > prod.stock) return alert("Sin stock");
    item.cantidad++;
  }else{
    carrito.push({
      id: prod.id,
      nombre: prod.nombre,
      precio: Number(prod.precio),
      imagen: prod.imagen,
      stock: Number(prod.stock),
      cantidad: 1
    });
  }

  saveCart();
  renderCart();
  updateCount();

}

/* =========================
   RENDER CARRITO (FIX ABRIR)
========================= */

function renderCart(){

  const panel = document.getElementById("cartPanel");

  let total = 0;

  let html = `
    <div class="cart-header">
      <h3>Tu Carrito</h3>
      <span onclick="toggleCart()" style="cursor:pointer;font-size:22px">✕</span>
    </div>

    <div class="cart-body">
  `;

  if(carrito.length === 0){
    panel.innerHTML = html + "<p style='text-align:center'>Carrito vacío</p></div>";
    return;
  }

  carrito.forEach(item => {

    total += item.precio * item.cantidad;

    html += `
      <div class="cart-item">

        <div style="flex:1">
          <b>${item.nombre}</b><br>
          RD$ ${money(item.precio)}
        </div>

        <div class="qty">
          <button onclick="changeQty('${item.id}',-1)">-</button>
          ${item.cantidad}
          <button onclick="changeQty('${item.id}',1)">+</button>
        </div>

        <button class="delete-btn" onclick="removeItem('${item.id}')">
          🗑
        </button>

      </div>
    `;

  });

  html += `
    </div>

    <div class="cart-footer">

      <div class="cart-total">
        Total: RD$ ${money(total)}
      </div>

      <button class="checkout-btn" onclick="abrirCheckout()">
        Finalizar compra
      </button>

    </div>
  `;

  panel.innerHTML = html;
}

/* =========================
   CAMBIAR CANTIDAD
========================= */

function changeQty(id, n){

  const item = carrito.find(p => String(p.id) === String(id));
  const prod = productos.find(p => String(p.id) === String(id));

  if(!item) return;

  const next = item.cantidad + n;

  if(next <= 0){
    carrito = carrito.filter(p => p.id !== id);
  }else if(next <= prod.stock){
    item.cantidad = next;
  }

  saveCart();
  renderCart();
  updateCount();

}

function removeItem(id){

  carrito = carrito.filter(
    p => String(p.id) !== String(id)
  );

  saveCart();
  renderCart();
  updateCount();

}

   
/* =========================
   TOGGLE CART (FIX REAL)
========================= */

function toggleCart(){

  const panel = document.getElementById("cartPanel");

  panel.classList.toggle("open");

}

/* =========================
   CONTADOR FIX
========================= */

function updateCount(){

  const c = document.getElementById("cartCount");

  c.textContent = carrito.reduce((a,b) => a + b.cantidad, 0);

}

/* =========================
   STORAGE FIX
========================= */

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(carrito));
}

function cargarCarrito(){

  const d = localStorage.getItem("cart");

  carrito = d ? JSON.parse(d) : [];

  renderCart();
  updateCount();

}

/* =========================
   MONEY
========================= */

function money(v){
  return Number(v||0).toLocaleString("es-DO");
}

</script>
