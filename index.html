<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection | Moda y Estilo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter,sans-serif;
  margin:0;
  background:#eaeded;
}

/* ================= CART FLOAT ================= */

.cart-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff3b3b;
  color:white;
  border:none;
  font-size:20px;
  z-index:9999;
}

#cart-count{
  position:absolute;
  top:5px;
  right:8px;
  background:black;
  color:white;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ================= CART ================= */

.cart{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:white;
  box-shadow:-5px 0 20px rgba(0,0,0,.2);
  transform:translateX(100%);
  transition:.3s;
  z-index:9998;
  display:flex;
  flex-direction:column;
}

.cart.open{
  transform:translateX(0);
}

.cart-header{
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

.cart-items{
  flex:1;
  overflow:auto;
  padding:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.cart-footer{
  padding:15px;
  border-top:1px solid #ddd;
}

button{
  cursor:pointer;
}
</style>
</head>

<body>

<!-- BOTÓN FLOTANTE -->
<button id="cart-float-btn" class="cart-float">
  🛒 <span id="cart-count">0</span>
</button>

<!-- CARRITO -->
<aside class="cart" id="cart">

  <div class="cart-header">
    <h3>Carrito</h3>
    <button onclick="toggleCart()">✕</button>
  </div>

  <div class="cart-items" id="cartItems">
    <p style="text-align:center;color:#666;">Vacío</p>
  </div>

  <div class="cart-footer">
    <button onclick="finalizarCompra()" style="width:100%;padding:10px;background:green;color:white;border:none;">
      Finalizar compra
    </button>
  </div>

</aside>

<!-- EJEMPLO PRODUCTOS -->
<div style="padding:20px;">
  <h2>Productos</h2>

  <button onclick="agregarCarrito(1)">Agregar Producto 1</button>
  <button onclick="agregarCarrito(2)">Agregar Producto 2</button>
</div>

<script>

/* ================= DATA ================= */

let productos = [
  {id:1,nombre:"Camiseta Nike",precio:1200,stock:10},
  {id:2,nombre:"Zapatos Adidas",precio:3500,stock:5}
];

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* ================= CART TOGGLE ================= */

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

/* ================= SAVE ================= */

function guardar(){
  localStorage.setItem("carrito",JSON.stringify(carrito));
}

/* ================= ADD ================= */

function agregarCarrito(id){

  const p = productos.find(x=>x.id===id);
  if(!p) return;

  const item = carrito.find(x=>x.id===id);

  if(item){
    if(item.cantidad+1>p.stock) return;
    item.cantidad++;
    item.subtotal = item.cantidad * item.precio;
  }else{
    carrito.push({
      id:p.id,
      nombre:p.nombre,
      precio:p.precio,
      cantidad:1,
      subtotal:p.precio
    });
  }

  guardar();
  render();
}

/* ================= REMOVE / CHANGE ================= */

function cambiarCantidad(id,c){

  const item = carrito.find(x=>x.id===id);
  if(!item) return;

  const nueva = item.cantidad + c;

  if(nueva<=0){
    carrito = carrito.filter(x=>x.id!==id);
  }else{
    item.cantidad = nueva;
    item.subtotal = item.precio * nueva;
  }

  guardar();
  render();
}

/* ================= RENDER ================= */

function render(){

  const box = document.getElementById("cartItems");
  const count = document.getElementById("cart-count");

  let total = 0;
  let qty = 0;

  box.innerHTML = "";

  if(carrito.length===0){
    box.innerHTML = "<p style='text-align:center'>Vacío</p>";
    count.textContent = 0;
    return;
  }

  carrito.forEach(i=>{

    total += i.subtotal;
    qty += i.cantidad;

    box.innerHTML += `
      <div class="cart-item">
        <div>${i.nombre}<br>RD$ ${i.precio}</div>

        <div>
          <button onclick="cambiarCantidad(${i.id},-1)">-</button>
          ${i.cantidad}
          <button onclick="cambiarCantidad(${i.id},1)">+</button>
        </div>
      </div>
    `;
  });

  count.textContent = qty;
}

/* ================= FINALIZAR ================= */

function finalizarCompra(){

  if(carrito.length===0) return;

  alert("Compra finalizada ✔");

  carrito = [];
  guardar();
  render();
}

/* ================= CLICK FLOAT ================= */

document.getElementById("cart-float-btn")
.addEventListener("click",toggleCart);

/* ================= INIT ================= */

render();

</script>

</body>
</html>
