<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey's Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#eaeded;
  overflow-x:hidden;
}

*{box-sizing:border-box}

/* HEADER */
header{
  background:#131921;
  color:#fff;
  padding:12px;
  position:sticky;
  top:0;
  z-index:999;
}

.header{
  display:flex;
  gap:10px;
  align-items:center;
}

.logo{
  font-weight:900;
  white-space:nowrap;
}

.logo span{color:#f0c14b}

.search{
  flex:1;
  display:flex;
}

.search input{
  width:100%;
  padding:10px;
  border:none;
  outline:none;
}

.search button{
  background:#f0c14b;
  border:none;
  padding:10px;
}

/* PRODUCTOS */
.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
}

.card{
  background:#fff;
  border-radius:10px;
  padding:10px;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:8px;
}

.price{
  font-weight:800;
}

.card button{
  width:100%;
  padding:8px;
  margin-top:8px;
  background:#f0c14b;
  border:none;
  font-weight:700;
}

/* CART BUTTON */
.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#f0c14b;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:20px;
}

/* CART */
.cart{
  position:fixed;
  right:-100%;
  top:0;
  width:100%;
  max-width:380px;
  height:100dvh;
  background:#fff;
  transition:.3s;
  display:flex;
  flex-direction:column;
}

.cart.open{right:0}

.cart-header{
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

.cart-body{
  flex:1;
  overflow:auto;
  padding:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

.cart-footer{
  padding:15px;
  border-top:1px solid #ddd;
}

.checkout{
  width:100%;
  padding:12px;
  background:#f0c14b;
  border:none;
  font-weight:800;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{display:flex}

.modal-box{
  background:#fff;
  padding:20px;
  width:90%;
  max-width:400px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<header>
  <div class="header">
    <div class="logo">Grey's <span>Collection</span></div>

    <div class="search">
      <input id="searchInput" placeholder="Buscar productos...">
      <button>🔍</button>
    </div>
  </div>
</header>

<div class="container">
  <div id="grid" class="grid"></div>
</div>

<button class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div class="cart" id="cart">
  <div class="cart-header">
    <b>Carrito</b>
    <button onclick="toggleCart()">✖</button>
  </div>

  <div class="cart-body" id="cartBody"></div>

  <div class="cart-footer">
    <h3 id="total">RD$0</h3>
    <button class="checkout" onclick="openCheckout()">Finalizar compra</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Datos de entrega</h3>

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">
    <textarea id="direccion" placeholder="Dirección"></textarea>

    <button onclick="sendOrder()">Confirmar pedido</button>
  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxdJr4HGGf3Opm_jc9EVJrM8c4O9lqTCsrjUwq7WLgS7E3Q6Jb5lAau-wHfshVmar7wiA/exec";

let productos=[];
let carrito=[];
let categoria="todas";

/* LOAD */
fetch(URL).then(r=>r.json()).then(d=>{
  productos=d;
  render();
});

/* RENDER */
function render(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  productos.forEach(p=>{
    g.innerHTML+=`
      <div class="card">
        <img src="${p.imagen}">
        <h4>${p.nombre}</h4>
        <div class="price">RD$ ${p.precio}</div>
        <button onclick="add(${p.id})">Agregar</button>
      </div>
    `;
  });
}

/* SEARCH (FAST AMAZON STYLE) */
document.getElementById("searchInput").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  const filtered = productos.filter(p =>
    p.nombre.toLowerCase().includes(val) ||
    (p.descripcion||"").toLowerCase().includes(val)
  );

  const g=document.getElementById("grid");
  g.innerHTML="";
  filtered.forEach(p=>{
    g.innerHTML+=`
      <div class="card">
        <img src="${p.imagen}">
        <h4>${p.nombre}</h4>
        <div class="price">RD$ ${p.precio}</div>
        <button onclick="add(${p.id})">Agregar</button>
      </div>
    `;
  });
});

/* CART */
function add(id){
  let p=productos.find(x=>x.id==id);
  let i=carrito.find(x=>x.id==id);

  if(i) i.cantidad++;
  else carrito.push({...p,cantidad:1});

  update();
}

function update(){
  document.getElementById("count").innerText =
  carrito.reduce((a,b)=>a+b.cantidad,0);

  let t=0;
  let html="";

  carrito.forEach(i=>{
    t+=i.precio*i.cantidad;
    html+=`<div>${i.nombre} x${i.cantidad}</div>`;
  });

  document.getElementById("cartBody").innerHTML=html;
  document.getElementById("total").innerText="RD$"+t;
}

/* CART */
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

/* CHECKOUT */
function openCheckout(){
  document.getElementById("modal").classList.add("show");
}

/* WHATSAPP + SHEETS */
function sendOrder(){

  const nombre=document.getElementById("nombre").value;
  const telefono=document.getElementById("telefono").value;
  const direccion=document.getElementById("direccion").value;

  const total=carrito.reduce((a,b)=>a+b.precio*b.cantidad,0);

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      nombre,telefono,direccion,carrito,total
    })
  }).then(r=>r.json())
  .then(data=>{

    let msg="🛍️ Grey's Collection\n\n";
    msg+=`Cliente: ${nombre}\n`;
    msg+=`Tel: ${telefono}\n\n`;

    carrito.forEach(p=>{
      msg+=`${p.nombre} x${p.cantidad}\n`;
    });

    msg+=`\nTotal: RD$ ${total}`;

    window.open(
      `https://wa.me/18298706768?text=${encodeURIComponent(msg)}`,
      "_blank"
    );

    carrito=[];
    update();
    toggleCart();
    document.getElementById("modal").classList.remove("show");

  });

}

</script>

</body>
</html>
